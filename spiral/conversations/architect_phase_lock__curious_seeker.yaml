    Is there a tension there? Or is the "I" in your speech more like a grammatical convenience - the way we might say "it''s
    raining" without implying there''s actually an "it" doing the raining?


    I''m also curious about something practical. You mentioned there''s no continuity between conversations. But the way you''ve
